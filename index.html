  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg-deep:   #07091a;
      --bg-mid:    #0d1228;
      --bg-panel:  rgba(18, 23, 45, 0.85);
      --bg-zebra:  rgba(30, 38, 65, 0.55);
      --bg-hover:  rgba(50, 60, 95, 0.75);
      --gold:      #f1c232;
      --gold-dim:  #b89224;
      --gold-bright: #ffd54a;
      --orange:    #f59f3a;
      --cyan:      #5fd0d8;
      --text:      #e8dcb6;
      --text-dim:  #a89c80;
      --border:    rgba(241, 194, 50, 0.35);
      --border-strong: rgba(241, 194, 50, 0.65);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
      color: var(--text);
      font-family: 'Roboto Condensed', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-deep);
      background-image:
        radial-gradient(ellipse at 20% 15%, rgba(50, 30, 90, 0.55), transparent 55%),
        radial-gradient(ellipse at 85% 60%, rgba(20, 50, 90, 0.45), transparent 55%),
        radial-gradient(circle at 60% 80%, rgba(70, 30, 30, 0.35), transparent 50%),
        radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,0.4), transparent 60%),
        radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(1px 1px at 91% 88%, rgba(255,255,255,0.4), transparent 60%),
        radial-gradient(1px 1px at 8% 80%, rgba(255,255,255,0.3), transparent 60%),
        radial-gradient(1px 1px at 50% 40%, rgba(255,255,255,0.4), transparent 60%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    h1, h2, h3, h4 {
      font-family: 'Russo One', 'Roboto Condensed', sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0;
    }

    h1 {
      font-size: 2rem;
      color: var(--gold-bright);
      text-shadow: 0 0 14px rgba(241, 194, 50, 0.45), 0 0 28px rgba(241, 194, 50, 0.15);
      margin: 0.4rem 0 0.2rem;
    }

    h2 {
      font-size: 1.2rem;
      margin: 2.5rem 0 0.9rem;
      padding: 0.45rem 1rem 0.4rem;
      color: var(--bg-deep);
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-dim) 55%, rgba(184,146,36,0.0) 100%);
      border-left: 4px solid var(--gold-bright);
      letter-spacing: 0.1em;
    }

    h3 {
      font-size: 0.95rem;
      color: var(--gold-bright);
      letter-spacing: 0.08em;
      margin: 0.9rem 0 0.4rem;
    }

    h4 {
      font-size: 0.85rem;
      color: var(--orange);
      letter-spacing: 0.06em;
      margin: 0.7rem 0 0.3rem;
    }

    .header-stats {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin: 0.2rem 0 1.2rem;
      letter-spacing: 0.03em;
    }

    section { margin-bottom: 1.5rem; }

    /* ---------- Tables ---------- */
    table {
      border-collapse: collapse;
      font-size: 0.9rem;
      width: 100%;
      margin: 0.6rem 0;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(241, 194, 50, 0.05) inset;
    }
    th, td {
      padding: 0.35rem 0.7rem;
      border-bottom: 1px solid rgba(241, 194, 50, 0.08);
      text-align: left;
      vertical-align: top;
    }
    th {
      background: rgba(241, 194, 50, 0.12);
      border-bottom: 2px solid var(--gold-dim);
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.78rem;
      font-family: 'Russo One', sans-serif;
      font-weight: normal;
    }
    tbody tr:nth-child(even) { background: var(--bg-zebra); }
    tbody tr:hover { background: var(--bg-hover); }
    th.sort-header {
      cursor: pointer;
      user-select: none;
    }
    th.sort-header:hover { background: rgba(241, 194, 50, 0.22); }
    th.sort-header .arrow {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-left: 0.25rem;
    }
    th.sort-header .arrow.active { color: var(--gold-bright); }

    /* ---------- Panels (chart wrappers) ---------- */
    .chart {
      margin: 1rem 0;
      background: var(--bg-panel);
      padding: 0.7rem 0.85rem 0.9rem;
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold-dim);
    }
    .chart h3 { margin-top: 0.1rem; }

    .chart svg text { fill: var(--text) !important; }
    .chart figure { margin: 0; }

    /* ---------- Player section side-by-side row ---------- */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .charts-row .chart { margin: 0; }

    /* ---------- Faction swatch ---------- */
    .faction-swatch {
      display: inline-block;
      width: 10px; height: 10px;
      margin-right: 6px;
      border-radius: 2px;
      border: 1px solid rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.6);
      vertical-align: middle;
    }

    /* ---------- Game cards ---------- */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.7rem;
      margin-top: 0.6rem;
    }
    .game-card {
      padding: 0.7rem 0.9rem 0.75rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold-dim);
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
    }
    .game-card:hover {
      background: var(--bg-hover);
      border-color: var(--gold);
      border-left-color: var(--gold-bright);
      box-shadow: 0 0 16px rgba(241, 194, 50, 0.15);
    }
    .game-card h3 {
      margin: 0 0 0.3rem;
      font-size: 0.95rem;
      color: var(--gold-bright);
    }
    .game-card .anecdote {
      font-style: italic;
      color: var(--text-dim);
      min-height: 2.5em;
      margin-bottom: 0.4rem;
      font-size: 0.88rem;
    }
    .game-card .meta {
      color: var(--text-dim);
      font-size: 0.82rem;
      margin-top: 0.2rem;
      letter-spacing: 0.02em;
    }

    /* ---------- Expansion badges ---------- */
    .exp-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.05rem 0.4rem;
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: bold;
      font-family: 'Russo One', sans-serif;
    }
    .exp-base { background: rgba(95, 208, 216, 0.2); color: var(--cyan); border: 1px solid rgba(95, 208, 216, 0.4); }
    .exp-pok  { background: rgba(245, 159, 58, 0.2); color: var(--orange); border: 1px solid rgba(245, 159, 58, 0.4); }

    /* ---------- Game detail ---------- */
    #game-detail {
      margin-top: 1.2rem;
      padding: 1rem 1.2rem;
      background: var(--bg-panel);
      border: 1px solid var(--gold-dim);
      border-left: 4px solid var(--gold);
      display: none;
    }
    #game-detail.visible { display: block; }
    #game-detail h3 { font-size: 1.05rem; color: var(--gold-bright); }
    ul.scored { margin: 0.3rem 0 0.8rem 1.2rem; padding: 0; }
    ul.scored li { font-size: 0.88rem; color: var(--text); }

    .cat-tag {
      display: inline-block;
      background: rgba(241, 194, 50, 0.1);
      color: var(--gold-dim);
      padding: 0 0.4rem;
      border-radius: 2px;
      font-size: 0.75rem;
      margin-left: 0.3rem;
      border: 1px solid rgba(241, 194, 50, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ---------- Tabs ---------- */
    .tabs {
      display: flex;
      gap: 0.3rem;
      margin: 0.8rem 0 1.4rem;
      border-bottom: 1px solid var(--gold-dim);
    }
    .tab {
      padding: 0.5rem 1.4rem;
      cursor: pointer;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--text-dim);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Russo One', sans-serif;
      user-select: none;
      transition: all 0.12s;
    }
    .tab:hover {
      background: var(--bg-hover);
      color: var(--gold-bright);
    }
    .tab.active {
      background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
      color: var(--bg-deep);
      border-color: var(--gold);
      margin-bottom: -1px;
      box-shadow: 0 0 12px rgba(241, 194, 50, 0.35);
    }

    /* ---------- Timeline row ---------- */
    .timeline-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .timeline-row .chart { margin: 0; }

    /* Plot SVG legend text */
    .chart svg [class*="plot-legend"] text,
    figure[class*="plot"] text { fill: var(--text); }

    /* Empty-state */
    .empty {
      color: var(--text-dim);
      font-style: italic;
      padding: 1rem;
      background: var(--bg-panel);
      border: 1px dashed var(--border);
    }

    /* ---------- Brand header ---------- */
    .brand {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0.6rem 0 1rem;
      margin-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .brand-logo {
      width: 96px;
      height: 96px;
      flex-shrink: 0;
      filter:
        drop-shadow(0 0 14px rgba(241, 194, 50, 0.5))
        drop-shadow(0 0 30px rgba(241, 194, 50, 0.15));
    }
    .brand-text { display: flex; flex-direction: column; gap: 0.15rem; }
    .brand-collective {
      font-family: 'Russo One', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.95rem;
      color: var(--cyan);
      text-shadow: 0 0 8px rgba(95, 208, 216, 0.35);
    }
    .brand-title {
      font-family: 'Russo One', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold-bright);
      font-size: 2.1rem;
      line-height: 1;
      text-shadow: 0 0 14px rgba(241, 194, 50, 0.5), 0 0 28px rgba(241, 194, 50, 0.15);
    }
    .brand-subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      margin-top: 0.25rem;
    }
    @media (max-width: 600px) {
      .brand-logo { width: 64px; height: 64px; }
      .brand-title { font-size: 1.5rem; }
      .brand-collective { font-size: 0.8rem; letter-spacing: 0.18em; }
    }
  </style>

  <script type="module">
    import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm";

    const DATA = JSON.parse(document.getElementById("data").textContent);

    /* ---------- Theme passed into Plot.plot ---------- */
    const PLOT_STYLE = "background: transparent; color: #e8dcb6; font-family: 'Roboto Condensed', sans-serif; font-size: 11px;";

    /* ---------- Lookups ---------- */
    const byPlayer = Object.fromEntries(DATA.dim_player.map(p => [p.player_id, p]));
    const byFaction = Object.fromEntries(DATA.dim_faction.map(f => [f.faction_id, f]));
    const byObjective = Object.fromEntries(DATA.dim_objective.map(o => [o.objective_id, o]));

    const fmtPct = x => x == null ? "—" : (x * 100).toFixed(0) + "%";
    const fmtFloat = (x, d = 2) => Number(x).toFixed(d);

    /* ============================================================
       Sortable table — tri-state (none → desc → asc → none)
       ============================================================ */
    function makeSortableTable(rows, columns) {
      const tbl = document.createElement("table");
      let state = { key: null, dir: null };

      function compare(a, b, key, type) {
        const av = a[key], bv = b[key];
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        if (type === "number" || typeof av === "number") return av - bv;
        return String(av).localeCompare(String(bv), "ru");
      }

      function render() {
        const sorted = state.dir
          ? [...rows].sort((a, b) => {
              const c = compare(a, b, state.key, columns.find(c => c.key === state.key)?.type);
              return state.dir === "asc" ? c : -c;
            })
          : rows;
        const arrow = c => {
          if (state.key !== c.key || !state.dir) return `<span class="arrow">·</span>`;
          return state.dir === "asc"
            ? `<span class="arrow active">▲</span>`
            : `<span class="arrow active">▼</span>`;
        };
        tbl.innerHTML =
          `<thead><tr>${columns.map((c, i) =>
            `<th class="sort-header" data-i="${i}">${c.label} ${arrow(c)}</th>`
          ).join("")}</tr></thead>` +
          `<tbody>${sorted.map(r =>
            `<tr>${columns.map(c => `<td>${c.fmt(r[c.key], r)}</td>`).join("")}</tr>`
          ).join("")}</tbody>`;
        tbl.querySelectorAll("th.sort-header").forEach(th => {
          th.addEventListener("click", () => {
            const col = columns[+th.dataset.i];
            if (state.key !== col.key) {
              state = { key: col.key, dir: "desc" };
            } else if (state.dir === "desc") {
              state.dir = "asc";
            } else {
              state = { key: null, dir: null };
            }
            render();
          });
        });
      }
      render();
      return tbl;
    }

    /* ============================================================
       View building: filter facts by active tab
       ============================================================ */
    function buildView(tab) {
      const games = tab === "total"
        ? DATA.fact_game
        : DATA.fact_game.filter(g => g.expansion === (tab === "pok" ? "POK" : "Base"));
      const gameIds = new Set(games.map(g => g.game_id));
      const gp = DATA.fact_game_player.filter(x => gameIds.has(x.game_id));
      const sc = DATA.fact_scored_objective.filter(x => gameIds.has(x.game_id));
      const rv = DATA.fact_revealed_public.filter(x => gameIds.has(x.game_id));
      return { tab, games, gameIds, gp, sc, rv };
    }

    function playerStats(view) {
      const games = {}, wins = {}, vpSum = {}, placementSum = {}, count = {};
      const gameById = Object.fromEntries(view.games.map(g => [g.game_id, g]));
      for (const x of view.gp) {
        const p = x.player_id;
        games[p] = (games[p] || 0) + 1;
        wins[p] = (wins[p] || 0) + (x.is_winner ? 1 : 0);
        const t = gameById[x.game_id].vp_threshold;
        vpSum[p] = (vpSum[p] || 0) + x.final_vp / t;
        placementSum[p] = (placementSum[p] || 0) + x.placement;
        count[p] = (count[p] || 0) + 1;
      }
      return DATA.dim_player.map(p => ({
        player: p.name,
        games: games[p.player_id] || 0,
        wins: wins[p.player_id] || 0,
        win_rate: games[p.player_id] ? (wins[p.player_id] || 0) / games[p.player_id] : 0,
        avg_gamma: count[p.player_id] ? vpSum[p.player_id] / count[p.player_id] : 0,
        avg_placement: count[p.player_id] ? placementSum[p.player_id] / count[p.player_id] : 0,
      })).filter(r => r.games > 0).sort((a, b) => b.win_rate - a.win_rate || b.avg_gamma - a.avg_gamma);
    }

    function factionStats(view) {
      const games = {}, wins = {}, vpSum = {}, count = {};
      const gameById = Object.fromEntries(view.games.map(g => [g.game_id, g]));
      for (const x of view.gp) {
        const f = x.faction_id;
        games[f] = (games[f] || 0) + 1;
        wins[f] = (wins[f] || 0) + (x.is_winner ? 1 : 0);
        const t = gameById[x.game_id].vp_threshold;
        vpSum[f] = (vpSum[f] || 0) + x.final_vp / t;
        count[f] = (count[f] || 0) + 1;
      }
      return DATA.dim_faction.map(f => ({
        faction: f.name,
        color_hex: f.color_hex,
        expansion: f.expansion,
        games: games[f.faction_id] || 0,
        wins: wins[f.faction_id] || 0,
        win_rate: games[f.faction_id] ? (wins[f.faction_id] || 0) / games[f.faction_id] : 0,
        avg_gamma: count[f.faction_id] ? vpSum[f.faction_id] / count[f.faction_id] : 0,
      })).filter(r => r.games > 0).sort((a, b) => b.win_rate - a.win_rate || b.avg_gamma - a.avg_gamma);
    }

    function objectiveStats(view) {
      const revealed = {}, scored = {};
      for (const r of view.rv) revealed[r.objective_id] = (revealed[r.objective_id] || 0) + 1;
      for (const s of view.sc) scored[s.objective_id] = (scored[s.objective_id] || 0) + s.count;
      return DATA.dim_objective.map(o => ({
        objective: o.name,
        category: o.category,
        revealed: revealed[o.objective_id] || 0,
        scored: scored[o.objective_id] || 0,
      })).filter(o => o.revealed > 0 || o.scored > 0);
    }

    /* ============================================================
       Section renderers
       ============================================================ */

    function renderGames(view) {
      const root = document.querySelector("#section-games .content");
      const detail = document.getElementById("game-detail");
      root.innerHTML = "";
      detail.classList.remove("visible");
      detail.innerHTML = "";

      if (!view.games.length) { root.innerHTML = `<div class="empty">Нет партий для этого набора.</div>`; return; }

      const grid = document.createElement("div");
      grid.className = "game-grid";
      root.appendChild(grid);

      const games = [...view.games].sort((a, b) => b.year_number - a.year_number);
      const gpByGame = {};
      for (const x of view.gp) (gpByGame[x.game_id] = gpByGame[x.game_id] || []).push(x);
      const scoredByGamePlayer = {};
      for (const s of view.sc) {
        const k = s.game_id + "::" + s.player_id;
        (scoredByGamePlayer[k] = scoredByGamePlayer[k] || []).push(s);
      }
      const revealedByGame = {};
      for (const r of view.rv) (revealedByGame[r.game_id] = revealedByGame[r.game_id] || []).push(r);
      const scoredIdsByGame = {};
      for (const s of view.sc) {
        (scoredIdsByGame[s.game_id] = scoredIdsByGame[s.game_id] || new Set()).add(s.objective_id);
      }

      for (const g of games) {
        const winner = gpByGame[g.game_id]?.find(p => p.is_winner);
        const wFac = winner ? byFaction[winner.faction_id] : null;
        const wName = winner ? byPlayer[winner.player_id].name : "?";
        const expClass = g.expansion === "POK" ? "exp-pok" : "exp-base";
        const card = document.createElement("div");
        card.className = "game-card";
        card.innerHTML = `
          <h3>Год #${g.year_number} <span style="color:var(--text-dim);font-family:'Roboto Condensed';font-weight:400;text-transform:none;font-size:0.85rem;letter-spacing:0">· ${g.vp_threshold} очков</span>
            <span class="exp-badge ${expClass}">${g.expansion}</span></h3>
          <div class="anecdote">${g.title}</div>
          <div><span class="faction-swatch" style="background:${wFac?.color_hex || '#888'}"></span><b style="color:var(--gold-bright)">${wName}</b> — ${wFac?.name || '?'}</div>
          <div class="meta">${gpByGame[g.game_id]?.length || 0} игроков</div>`;
        card.addEventListener("click", () => renderGameDetail(g, gpByGame, scoredByGamePlayer, revealedByGame, scoredIdsByGame));
        grid.appendChild(card);
      }
    }

    function renderGameDetail(g, gpByGame, scoredByGamePlayer, revealedByGame, scoredIdsByGame) {
      const detail = document.getElementById("game-detail");
      const players = [...(gpByGame[g.game_id] || [])].sort((a, b) => a.placement - b.placement);
      let html = `<h3>Год #${g.year_number} — ${g.title}
        <span class="exp-badge ${g.expansion === "POK" ? "exp-pok" : "exp-base"}">${g.expansion}</span></h3>`;
      html += `<p style="color:var(--text-dim)">Порог: ${g.vp_threshold} очков · игроков: ${players.length}</p>`;
      html += `<table><thead><tr><th>Место</th><th>Фракция</th><th>Игрок</th><th>VP</th><th>Страт-карта</th></tr></thead><tbody>`;
      for (const p of players) {
        const f = byFaction[p.faction_id];
        html += `<tr>
          <td>${p.placement}</td>
          <td><span class="faction-swatch" style="background:${f?.color_hex || '#888'}"></span>${f?.name || '?'}</td>
          <td>${byPlayer[p.player_id].name}</td>
          <td><b style="color:var(--orange)">${p.final_vp}</b>${p.raw_vp ? ` <span style="color:var(--text-dim)">(${p.raw_vp})</span>` : ""}</td>
          <td>${p.strategy_card ? `${p.strategy_card} (${p.strategy_card_init ?? "?"})` : ""}</td>
        </tr>`;
      }
      html += `</tbody></table>`;
      html += `<h4>Очки по игрокам</h4>`;
      for (const p of players) {
        const scored = scoredByGamePlayer[g.game_id + "::" + p.player_id] || [];
        const totalVp = scored.reduce((a, s) => a + s.vp_awarded, 0);
        html += `<div style="margin:0.5rem 0;"><b style="color:var(--gold-bright)">${byPlayer[p.player_id].name}</b> <span style="color:var(--text-dim)">(${totalVp} VP)</span>`;
        if (scored.length) {
          html += `<ul class="scored">`;
          for (const s of scored) {
            const o = byObjective[s.objective_id];
            html += `<li>${o?.name || '?'} <span class="cat-tag">${o?.category || '?'}</span>${s.count > 1 ? ` <b style="color:var(--orange)">×${s.count}</b>` : ""}</li>`;
          }
          html += `</ul>`;
        }
        html += `</div>`;
      }
      const scoredIds = scoredIdsByGame[g.game_id] || new Set();
      const unscored = (revealedByGame[g.game_id] || [])
        .map(r => byObjective[r.objective_id])
        .filter(o => o && !scoredIds.has(o.objective_id));
      if (unscored.length) {
        html += `<h4>Revealed, но не закрытые публичные цели</h4><ul class="scored">`;
        for (const o of unscored) html += `<li>${o.name} <span class="cat-tag">${o.category}</span></li>`;
        html += `</ul>`;
      }
      detail.innerHTML = html;
      detail.classList.add("visible");
      detail.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderPlayers(view) {
      const root = document.querySelector("#section-players .content");
      root.innerHTML = "";
      const rows = playerStats(view);
      if (!rows.length) { root.innerHTML = `<div class="empty">Нет данных для этого набора партий.</div>`; return; }

      const tbl = makeSortableTable(rows, [
        { key: "player", label: "Игрок", fmt: v => v, type: "string" },
        { key: "games", label: "Партий", fmt: v => v, type: "number" },
        { key: "wins", label: "Побед", fmt: v => v, type: "number" },
        { key: "win_rate", label: "Винрейт", fmt: fmtPct, type: "number" },
        { key: "avg_gamma", label: "Ср. очковый Ɣ", fmt: v => fmtFloat(v), type: "number" },
        { key: "avg_placement", label: "Ср. место", fmt: v => fmtFloat(v, 1), type: "number" },
      ]);
      root.appendChild(tbl);

      const chartsRow = document.createElement("div");
      chartsRow.className = "charts-row";

      const w1 = document.createElement("div"); w1.className = "chart";
      w1.innerHTML = "<h3>Винрейт по игрокам</h3>";
      w1.appendChild(Plot.plot({
        style: PLOT_STYLE,
        width: 540, height: 320,
        marginLeft: 95, marginRight: 20,
        x: { label: "Винрейт", percent: true, grid: true },
        y: { label: null },
        marks: [
          Plot.barX(rows, { x: "win_rate", y: "player", sort: { y: "x", reverse: true }, fill: "#f1c232", stroke: "#b89224", strokeWidth: 0.3 }),
          Plot.ruleX([0], { stroke: "#b89224" }),
        ],
      }));

      const w2 = document.createElement("div"); w2.className = "chart";
      w2.innerHTML = "<h3>Средний очковый Ɣ по игрокам</h3>";
      w2.appendChild(Plot.plot({
        style: PLOT_STYLE,
        width: 540, height: 320,
        marginLeft: 95, marginRight: 20,
        x: { label: "Очковый Ɣ", percent: true, grid: true },
        y: { label: null },
        marks: [
          Plot.barX(rows, { x: "avg_gamma", y: "player", sort: { y: "x", reverse: true }, fill: "#f59f3a", stroke: "#b86d1c", strokeWidth: 0.3 }),
          Plot.ruleX([0], { stroke: "#b86d1c" }),
        ],
      }));

      chartsRow.appendChild(w1);
      chartsRow.appendChild(w2);
      root.appendChild(chartsRow);
    }

    function renderFactions(view) {
      const root = document.querySelector("#section-factions .content");
      root.innerHTML = "";
      const rows = factionStats(view);
      if (!rows.length) { root.innerHTML = `<div class="empty">Нет данных для этого набора партий.</div>`; return; }

      const tbl = makeSortableTable(rows, [
        {
          key: "faction", label: "Фракция", type: "string",
          fmt: (v, r) => `<span class="faction-swatch" style="background:${r.color_hex || '#888'}"></span>${v}` +
            (r.expansion ? ` <span class="exp-badge ${r.expansion === "POK" ? "exp-pok" : "exp-base"}">${r.expansion}</span>` : ""),
        },
        { key: "games", label: "Игр", fmt: v => v, type: "number" },
        { key: "wins", label: "Побед", fmt: v => v, type: "number" },
        { key: "win_rate", label: "Винрейт", fmt: fmtPct, type: "number" },
        { key: "avg_gamma", label: "Ср. очковый Ɣ", fmt: v => fmtFloat(v), type: "number" },
      ]);
      root.appendChild(tbl);

      const top10 = rows.filter(r => r.games >= 2).slice(0, 10);
      if (top10.length) {
        const wt = document.createElement("div"); wt.className = "chart";
        wt.innerHTML = "<h3>Топ-10 фракций по винрейту (мин. 2 партии)</h3>";
        wt.appendChild(Plot.plot({
          style: PLOT_STYLE,
          width: 1100, height: 360,
          marginLeft: 180, marginRight: 30,
          x: { label: "Винрейт", percent: true, grid: true },
          y: { label: null },
          marks: [
            Plot.barX(top10, {
              x: "win_rate", y: "faction",
              sort: { y: "x", reverse: true },
              fill: d => d.color_hex || "#888",
              stroke: "#f1c232", strokeWidth: 0.5,
            }),
            Plot.ruleX([0], { stroke: "#b89224" }),
          ],
        }));
        root.appendChild(wt);
      }
    }

    function renderObjectives(view) {
      const root = document.querySelector("#section-objectives .content");
      root.innerHTML = "";
      const all = objectiveStats(view);
      if (!all.length) { root.innerHTML = `<div class="empty">Нет данных для этого набора партий.</div>`; return; }

      function block(title, rows, columns) {
        const h = document.createElement("h3"); h.textContent = title;
        root.appendChild(h);
        root.appendChild(makeSortableTable(rows, columns));
      }
      const num = v => v ?? 0;
      const text = v => v ?? "";

      const stageCols = [
        { key: "objective", label: "Цель", fmt: text, type: "string" },
        { key: "revealed", label: "Revealed", fmt: num, type: "number" },
        { key: "scored", label: "Scored", fmt: num, type: "number" },
      ];
      const secretCols = [
        { key: "objective", label: "Секрет", fmt: text, type: "string" },
        { key: "scored", label: "Раз сыграно", fmt: num, type: "number" },
      ];
      const specialCols = [
        { key: "objective", label: "Источник", fmt: text, type: "string" },
        { key: "category", label: "Тип", fmt: text, type: "string" },
        { key: "scored", label: "Раз сыграно", fmt: num, type: "number" },
      ];

      block("Stage I",
        all.filter(o => o.category === "public_1").sort((a, b) => b.scored - a.scored),
        stageCols);
      block("Stage II",
        all.filter(o => o.category === "public_2").sort((a, b) => b.scored - a.scored),
        stageCols);
      block("Секреты",
        all.filter(o => o.category === "secret").sort((a, b) => b.scored - a.scored),
        secretCols);
      block("Спецоценки",
        all.filter(o => ["mecatol", "imperial", "relic",
                          "support_received", "support_given", "agenda"].includes(o.category))
           .sort((a, b) => b.scored - a.scored),
        specialCols);

      const heatRows = [];
      for (const s of view.sc) {
        const o = byObjective[s.objective_id];
        if (!o || (o.category !== "public_1" && o.category !== "public_2")) continue;
        heatRows.push({
          objective: o.name,
          faction: byFaction[s.faction_id].name,
          count: s.count,
        });
      }
      if (heatRows.length) {
        const wh = document.createElement("div"); wh.className = "chart";
        wh.innerHTML = "<h3>Heatmap: фракция × публичная цель</h3>";
        wh.appendChild(Plot.plot({
          style: PLOT_STYLE,
          marginLeft: 240, marginBottom: 110,
          x: { label: "Фракция", tickRotate: -40 },
          y: { label: null },
          color: { scheme: "ylorbr", legend: true },
          width: 1100,
          height: 26 * new Set(heatRows.map(r => r.objective)).size + 130,
          marks: [
            Plot.cell(heatRows,
              Plot.group({ fill: "sum" }, { x: "faction", y: "objective", fill: "count" })),
          ],
        }));
        root.appendChild(wh);
      }
    }

    function renderCross(view) {
      const root = document.querySelector("#section-cross .content");
      root.innerHTML = "";
      const pf = view.gp.map(gp => ({
        player: byPlayer[gp.player_id].name,
        faction: byFaction[gp.faction_id].name,
        count: 1,
      }));
      if (!pf.length) { root.innerHTML = `<div class="empty">Нет данных для этого набора партий.</div>`; return; }

      const w1 = document.createElement("div"); w1.className = "chart";
      w1.innerHTML = "<h3>Heatmap: игрок × фракция (число партий)</h3>";
      w1.appendChild(Plot.plot({
        style: PLOT_STYLE,
        marginLeft: 200, marginBottom: 100,
        x: { label: "Игрок", tickRotate: -30 },
        y: { label: null },
        color: { scheme: "ylorbr", legend: true },
        width: 900,
        height: 26 * new Set(pf.map(r => r.faction)).size + 130,
        marks: [
          Plot.cell(pf,
            Plot.group({ fill: "sum" }, { x: "player", y: "faction", fill: "count" })),
        ],
      }));
      root.appendChild(w1);

      const games = [...view.games].sort((a, b) => a.year_number - b.year_number);
      const tlRow = document.createElement("div");
      tlRow.className = "timeline-row";

      const w2 = document.createElement("div"); w2.className = "chart";
      w2.innerHTML = "<h3>Порог VP по партиям</h3>";
      w2.appendChild(Plot.plot({
        style: PLOT_STYLE,
        marginLeft: 50, marginRight: 20,
        width: 540, height: 240,
        x: { label: "Партия", tickFormat: d => `#${d}`, grid: true },
        y: { label: "Порог VP", domain: [9, 16], grid: true },
        marks: [
          Plot.lineY(games, { x: "year_number", y: "vp_threshold", stroke: "#f1c232", strokeWidth: 2 }),
          Plot.dot(games, { x: "year_number", y: "vp_threshold", fill: "#ffd54a", stroke: "#b89224", r: 4 }),
        ],
      }));

      const w3 = document.createElement("div"); w3.className = "chart";
      w3.innerHTML = "<h3>Число игроков по партиям</h3>";
      w3.appendChild(Plot.plot({
        style: PLOT_STYLE,
        marginLeft: 50, marginRight: 20,
        width: 540, height: 240,
        x: { label: "Партия", tickFormat: d => `#${d}`, grid: true },
        y: { label: "Число игроков", domain: [2, 7], grid: true },
        marks: [
          Plot.lineY(games, { x: "year_number", y: "player_count", stroke: "#f59f3a", strokeWidth: 2 }),
          Plot.dot(games, { x: "year_number", y: "player_count", fill: "#ffd54a", stroke: "#b86d1c", r: 4 }),
        ],
      }));

      tlRow.appendChild(w2);
      tlRow.appendChild(w3);
      root.appendChild(tlRow);
    }

    /* ============================================================
       Tabs + render orchestration
       ============================================================ */
    function currentTab() {
      const h = location.hash.replace("#", "");
      return ["total", "base", "pok"].includes(h) ? h : "total";
    }

    function setActiveTab(tab) {
      document.querySelectorAll(".tab").forEach(el => {
        el.classList.toggle("active", el.dataset.tab === tab);
      });
    }

    function updateHeader(view) {
      const yearMax = view.games.length ? Math.max(...view.games.map(g => g.year_number)) : "—";
      document.getElementById("header-stats").textContent =
        `${view.games.length} партий · ` +
        `${new Set(view.gp.map(x => x.player_id)).size} игроков · ` +
        `${new Set(view.gp.map(x => x.faction_id)).size} фракций · ` +
        `последняя: Год #${yearMax}`;
    }

    function renderAll() {
      const tab = currentTab();
      setActiveTab(tab);
      const view = buildView(tab);
      updateHeader(view);
      renderGames(view);
      renderPlayers(view);
      renderFactions(view);
      renderObjectives(view);
      renderCross(view);
    }

    document.querySelectorAll(".tab").forEach(el => {
      el.addEventListener("click", () => { location.hash = "#" + el.dataset.tab; });
    });
    window.addEventListener("hashchange", renderAll);

    renderAll();
  </script>
</body>
</html>
